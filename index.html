<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Local Business Website</title>
  <style>
    .chat-widget {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 360px;
      height: 440px;
      border: 6px solid red;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(255,0,0,0.3);
      background: #ffe6e6;
      overflow: hidden;
      z-index: 10000;
      display: none;
    }
    .chat-header {
      padding: 20px 24px;
      background: #d32f2f;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }
    .chat-messages {
      height: 300px;
      padding: 20px 24px;
      overflow-y: auto;
      font-size: 16px;
      color: #333;
      background: #fff;
    }
    .chat-message {
      margin: 10px 0;
      word-wrap: break-word;
    }
    .chat-message.user {
      text-align: right;
    }
    .chat-message.ai {
      text-align: left;
    }
    .chat-input {
      display: flex;
      padding: 16px 20px;
      border-top: 3px solid #d32f2f;
    }
    .chat-input input {
      flex-grow: 1;
      padding: 12px 16px;
      border: 2px solid #d32f2f;
      border-radius: 20px;
      font-size: 16px;
      background: #fff;
    }
    .chat-input button {
      margin-left: 10px;
      padding: 0 20px;
      border: none;
      background: #d32f2f;
      color: white;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .chat-toggle {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 64px;
      height: 64px;
      background: #d32f2f;
      border-radius: 32px;
      box-shadow: 0 8px 24px rgba(255,0,0,0.4);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      z-index: 10001;
    }
  </style>
</head>
<body>

  <h1>Welcome to Our Local Business</h1>
  <p>Any normal site content here.</p>

  <!-- Chat widget (now inline) -->
  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">Chat with us</div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-message ai">Hi! Ask me anything about this business.</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Type your question..." />
      <button id="chatSend">Send</button>
    </div>
  </div>

  <div class="chat-toggle" id="chatToggle">💬</div>

  <!-- MAKE WEBHOOK CONFIG -->
  <script>
    const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/kkyfx0yc5b82h9qpqo6v6hecdlxms0qb";
    const API_KEY = "your-api-key";
    const BUSINESS_ID = "local-cafe-123";

    // NEW thread on every page load
    const threadId = "thread-" + Math.random().toString(36).substr(2, 9);
  </script>

  <!-- Widget JS logic (trimmed) -->
  <script>
    "use strict";

    const chatWidget = document.getElementById("chatWidget");
    const chatToggle = document.getElementById("chatToggle");
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const chatSend = document.getElementById("chatSend");

    chatToggle.addEventListener("click", () => {
      chatWidget.style.display =
        chatWidget.style.display === "block" ? "none" : "block";
    });

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      chatInput.value = "";

      const tempId = "temp-" + Date.now();
      addMessage("...", "ai", tempId);

      fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-API-Key": API_KEY,
        },
        body: JSON.stringify({
          message: text,
          businessId: BUSINESS_ID,
          threadId: threadId,
        }),
      })
        .then((response) => response.json())
        .then((data) => {
          const tempEl = document.getElementById(tempId);
          if (tempEl) {
            tempEl.textContent = data.reply || "I'm not sure how to help.";
          }
        })
        .catch((err) => {
          console.error(err);
          const tempEl = document.getElementById(tempId);
          if (tempEl)
            tempEl.textContent = "Sorry, something went wrong.";
        });
    }

    function addMessage(text, role, id) {
      const p = document.createElement("p");
      p.className = "chat-message " + role;
      if (id) p.id = id;
      p.textContent = text;
      chatMessages.appendChild(p);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatSend.addEventListener("click", sendMessage);
    chatInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>

</body>
</html>
